name: Sync BoM COG to GitHub Pages

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install GDAL and Rasterio
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev
          pip install rasterio

      - name: Run COG Update Script
        run: python update_clouds.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add latest_cloud.tif
          # Only commit if the file actually changed to save bandwidth
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update COG cloud imagery: $(date)" && git push)
